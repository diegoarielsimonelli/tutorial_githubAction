# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
name: Python application

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BASE_DE_DATOS: "32434562link"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      # Corrección del paso suelto usando la acción oficial
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Agregamos ruff y mypy aquí para que no fallen los comandos de abajo
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Mostrar variable de entorno
        run: echo "la clave de la base de datos es ${{ env.BASE_DE_DATOS }}"

      - name: Ejecutar ruff
        run: ruff check carrito.py

      - name: Ejecutar mypy
        run: mypy --strict carrito.py

      - name: Pruebas con variables y secretos

        run: |
          echo "La URL de la API es: ${{ vars.API_URL }}"
          echo El token secreto es: ${{ secrets.SUPER_PASSWORD }}
